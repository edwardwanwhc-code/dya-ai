<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DYA_AI — IG First Post</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #030712;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    .ig-post {
      width: 680px;
      height: 680px;
      background: linear-gradient(180deg, #0a0f1e 0%, #030712 100%);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 40px;
    }
    /* Grid background */
    .ig-post::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(79,70,229,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79,70,229,0.06) 1px, transparent 1px);
      background-size: 30px 30px;
      pointer-events: none;
    }
    /* Radial rings */
    .rings {
      position: absolute;
      top: 180px;
      left: 50%;
      transform: translateX(-50%);
      width: 460px;
      height: 460px;
      pointer-events: none;
    }
    .rings::before,
    .rings::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      border: 1px solid transparent;
    }
    .rings::before {
      inset: 0;
      border-color: rgba(79,70,229,0.15);
    }
    .rings::after {
      inset: 35px;
      border-color: rgba(6,182,212,0.1);
    }
    /* Logo container */
    .logo-wrap {
      position: relative;
      z-index: 1;
      margin-top: 60px;
      margin-bottom: 20px;
    }
    .logo-wrap img {
      width: 320px;
      height: auto;
      filter: drop-shadow(0 0 40px rgba(79,70,229,0.3));
    }
    /* Tagline */
    .tagline {
      font-size: 15px;
      font-weight: 500;
      color: #64748b;
      letter-spacing: 5px;
      margin-bottom: 30px;
      position: relative;
      z-index: 1;
    }
    /* Divider */
    .divider {
      width: 280px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #4f46e5, transparent);
      margin-bottom: 35px;
      position: relative;
      z-index: 1;
    }
    /* Cards */
    .cards {
      display: flex;
      gap: 18px;
      position: relative;
      z-index: 1;
    }
    .card {
      width: 170px;
      height: 112px;
      background: rgba(15,10,46,0.6);
      border: 1.2px solid;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
      backdrop-filter: blur(10px);
    }
    .card:nth-child(1) {
      border-color: #818cf8;
      box-shadow: 0 0 20px rgba(129,140,248,0.15), inset 0 4px 0 #818cf8;
    }
    .card:nth-child(2) {
      border-color: #06b6d4;
      box-shadow: 0 0 20px rgba(6,182,212,0.15), inset 0 4px 0 #06b6d4;
    }
    .card:nth-child(3) {
      border-color: #a78bfa;
      box-shadow: 0 0 20px rgba(167,139,250,0.15), inset 0 4px 0 #a78bfa;
    }
    .card-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      margin-bottom: 12px;
    }
    .card:nth-child(1) .card-icon { background: #312e81; }
    .card:nth-child(2) .card-icon { background: #155e75; }
    .card:nth-child(3) .card-icon { background: #4c1d95; }
    .card-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .card:nth-child(1) .card-title { color: #e0e7ff; }
    .card:nth-child(2) .card-title { color: #cffafe; }
    .card:nth-child(3) .card-title { color: #ede9fe; }
    .card-desc {
      font-size: 11px;
      color: #94a3b8;
    }
    /* Footer */
    .footer {
      margin-top: auto;
      text-align: center;
      position: relative;
      z-index: 1;
    }
    .handle {
      font-size: 18px;
      font-weight: 700;
      color: #2dd4bf;
      letter-spacing: 3px;
      margin-bottom: 8px;
    }
    .bio {
      font-size: 12px;
      color: #475569;
    }
    /* Glow effects */
    .glow {
      position: absolute;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(79,70,229,0.15) 0%, transparent 70%);
      border-radius: 50%;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="ig-post">
    <div class="glow"></div>
    <div class="rings"></div>

    <div class="logo-wrap">
      <img src="DYA_AI_logo.png" alt="DYA_AI Logo">
    </div>

    <div class="tagline">DID YOU ASK AI?</div>
    <div class="divider"></div>

    <div class="cards">
      <div class="card">
        <div class="card-icon">📖</div>
        <div class="card-title">教人用 AI</div>
        <div class="card-desc">實用教學指南</div>
      </div>
      <div class="card">
        <div class="card-icon">🔧</div>
        <div class="card-title">拆解 AI 工具</div>
        <div class="card-desc">深入評測分析</div>
      </div>
      <div class="card">
        <div class="card-icon">📡</div>
        <div class="card-title">分享 AI 資訊</div>
        <div class="card-desc">每週行業動態</div>
      </div>
    </div>

    <div class="footer">
      <div class="handle">@dya_ai</div>
      <div class="bio">香港 AI Master 在讀 · 現職 AI 從業者</div>
    </div>
  </div>
</body>
</html>

<svg viewBox="0 0 500 500" width="100%" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>DYA_AI Logo</title>
  <desc>DidYouAskAI brand logo - geometric AI node with gradient typography</desc>
  <defs>
    <linearGradient id="logoBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06091a"/>
      <stop offset="100%" stop-color="#0d1b3e"/>
    </linearGradient>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="logoHexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="500" height="500" fill="url(#logoBg)"/>

  <!-- Center AI Node -->
  <g transform="translate(250,210)" filter="url(#glow)">
    <circle cx="0" cy="0" r="78" fill="none" stroke="url(#logoHexGrad)" stroke-width="1.5" stroke-dasharray="10 6" opacity="0.5"/>
    <circle cx="0" cy="0" r="56" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.3"/>
    <polygon points="0,-50 43,-25 43,25 0,50 -43,25 -43,-25" fill="#1a1050" stroke="url(#logoHexGrad)" stroke-width="1.8"/>
    <polygon points="0,-50 43,-25 43,25 0,50 -43,25 -43,-25" fill="#4c1d95" opacity="0.35"/>
    <line x1="0" y1="-20" x2="0" y2="20" stroke="#a78bfa" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="-20" x2="15" y2="-10" stroke="#38bdf8" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="0" y1="20" x2="15" y2="10" stroke="#38bdf8" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="0" cy="-50" r="4.5" fill="#a78bfa"/>
    <circle cx="43" cy="-25" r="4.5" fill="#7c3aed"/>
    <circle cx="43" cy="25" r="4.5" fill="#06b6d4"/>
    <circle cx="0" cy="50" r="4.5" fill="#38bdf8"/>
    <circle cx="-43" cy="25" r="4.5" fill="#7c3aed"/>
    <circle cx="-43" cy="-25" r="4.5" fill="#a78bfa"/>
  </g>

  <!-- DYA Text -->
  <text x="250" y="330" text-anchor="middle" font-family="'Segoe UI','Arial Black',sans-serif" font-size="78" font-weight="900" fill="url(#logoGrad)" filter="url(#glow)" letter-spacing="3">DYA</text>

  <!-- _AI Subscript -->
  <text x="250" y="370" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="24" font-weight="600" fill="#a78bfa" letter-spacing="4">_AI</text>

  <!-- Tagline -->
  <text x="250" y="430" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="16" fill="#64748b" letter-spacing="4">DID YOU ASK AI?</text>
</svg>
